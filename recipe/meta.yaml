{% set name = "azure-mgmt-billing" %}
{% set version = "7.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace("-", "_") }}-{{ version }}.tar.gz
  sha256: 8e0a65c65110b53a42937e5bed6ae00efc9d6206972d96bfd4a74e80c85c2d7b

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  host:
    - setuptools
    - python
    - pip
    - wheel
  run:
    - python
    - isodate >=0.6.1
    - typing-extensions >=4.6.0
    - azure-common >=1.1
    - azure-mgmt-core >=1.3.2

test:
  imports:
    - azure.mgmt.billing
    - azure.mgmt.billing.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Billing Client Library for Python
  license: MIT
  license_file: LICENSE.txt
  license_family: MIT
  description: Microsoft Azure Billing Client Library for Python
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
